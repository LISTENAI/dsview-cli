name: CI

on:
  push:
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test-package:
    name: build-test-package (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package_bundle: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            package_bundle: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            package_bundle: true
          - target: aarch64-apple-darwin
            runner: macos-14
            package_bundle: true
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            msvc_arch: x64
            package_bundle: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Initialize MSVC developer command prompt
        if: contains(matrix.target, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup native prerequisites
        uses: ./.github/actions/setup-native-prereqs
        with:
          target: ${{ matrix.target }}

      - name: Derive build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DSVIEW_BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build workspace
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Find runtime library
        if: matrix.package_bundle
        id: find-runtime
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "dsview_runtime.dll" | head -n 1)
          elif [[ "${{ matrix.target }}" == *"darwin"* ]] || [[ "${{ matrix.target }}" == *"macos"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.dylib" | head -n 1)
          else
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.so" | head -n 1)
          fi
          echo "runtime-lib=$RUNTIME_LIB" >> $GITHUB_OUTPUT

      - name: Determine executable path
        if: matrix.package_bundle
        id: exe-path
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "exe=target/${{ matrix.target }}/release/dsview-cli.exe" >> $GITHUB_OUTPUT
          else
            echo "exe=target/${{ matrix.target }}/release/dsview-cli" >> $GITHUB_OUTPUT
          fi

      - name: Package and validate bundle
        if: matrix.package_bundle
        uses: ./.github/actions/package-and-validate
        with:
          target: ${{ matrix.target }}
          version: ${{ steps.version.outputs.version }}
          exe-path: ${{ steps.exe-path.outputs.exe }}
          runtime-path: ${{ steps.find-runtime.outputs.runtime-lib }}
