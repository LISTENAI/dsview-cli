name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-release:
    name: build-release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-pc-windows-msvc
            runner: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup native prerequisites
        uses: ./.github/actions/setup-native-prereqs
        with:
          target: ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build workspace
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Find runtime library
        id: find-runtime
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "dsview_runtime.dll" | head -n 1)
          elif [[ "${{ matrix.target }}" == *"darwin"* ]] || [[ "${{ matrix.target }}" == *"macos"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.dylib" | head -n 1)
          else
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.so" | head -n 1)
          fi
          echo "runtime-lib=$RUNTIME_LIB" >> $GITHUB_OUTPUT

      - name: Determine executable path
        id: exe-path
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "exe=target/${{ matrix.target }}/release/dsview-cli.exe" >> $GITHUB_OUTPUT
          else
            echo "exe=target/${{ matrix.target }}/release/dsview-cli" >> $GITHUB_OUTPUT
          fi

      - name: Package and validate bundle
        uses: ./.github/actions/package-and-validate
        with:
          target: ${{ matrix.target }}
          version: ${{ steps.version.outputs.version }}
          exe-path: ${{ steps.exe-path.outputs.exe }}
          runtime-path: ${{ steps.find-runtime.outputs.runtime-lib }}

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: dsview-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}
          path: dsview-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz
          retention-days: 90

  publish-release:
    name: publish-release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all release bundles
        uses: actions/download-artifact@v4
        with:
          path: release-bundles

      - name: Generate checksums
        shell: bash
        run: |
          cd release-bundles
          find . -name "*.tar.gz" -exec sha256sum {} \; | sed 's|^\./||' | sed 's|/| |' | awk '{print $1 "  " $3}' > ../dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt
          cd ..
          cat dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-bundles/*/*.tar.gz
            dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt
          body: |
            ## DSView CLI ${{ steps.version.outputs.version }}

            ### Supported Platforms

            This release provides pre-built bundles for:
            - Linux x86_64 and ARM64
            - macOS x86_64 (Intel) and ARM64 (Apple Silicon)
            - Windows x86_64

            ### Bundle Contents

            Each bundle contains:
            - `dsview-cli` executable (or `dsview-cli.exe` on Windows)
            - `runtime/` directory with the platform-specific runtime library
            - `resources/` directory with DSLogic Plus firmware and bitstreams

            ### Installation

            1. Download the bundle for your platform
            2. Verify the checksum against `dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt`
            3. Extract the archive: `tar xzf dsview-cli-${{ steps.version.outputs.version }}-<platform>.tar.gz`
            4. Run the CLI from the extracted directory

            ### Usage

            The CLI automatically discovers bundled runtime and resources relative to the executable location. Use `--resource-dir` to override the resource directory if needed.

            See the [README](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.version }}/README.md) for detailed usage instructions.

            ### Device Support

            This release supports **DSLogic Plus** devices only.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
