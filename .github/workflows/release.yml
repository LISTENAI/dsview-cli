name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-release:
    name: build-release (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package_bundle: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            package_bundle: true
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            package_bundle: true
          - target: aarch64-apple-darwin
            runner: macos-14
            package_bundle: true
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            msvc_arch: x64
            package_bundle: true
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            msvc_arch: arm64
            package_bundle: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Apply DSView local patches (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        shell: bash
        run: ./scripts/apply-dsview-patches.sh

      - name: Apply DSView local patches (Windows)
        if: ${{ contains(matrix.target, 'windows') }}
        shell: pwsh
        run: ./scripts/apply-dsview-patches.ps1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python (Unix)
        if: ${{ !contains(matrix.target, 'windows') }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Python (Windows)
        if: contains(matrix.target, 'windows')
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: ${{ matrix.msvc_arch }}

      - name: Initialize MSVC developer command prompt
        if: contains(matrix.target, 'windows')
        uses: ./.github/actions/setup-msvc-dev-cmd
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Prepare Windows vcpkg cache directories
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $BinaryCache = Join-Path $env:GITHUB_WORKSPACE ".cache\vcpkg\binary"
          $DownloadsCache = Join-Path $env:GITHUB_WORKSPACE ".cache\vcpkg\downloads"
          New-Item -ItemType Directory -Force -Path $BinaryCache | Out-Null
          New-Item -ItemType Directory -Force -Path $DownloadsCache | Out-Null
          "VCPKG_DEFAULT_BINARY_CACHE=$BinaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "VCPKG_DOWNLOADS=$DownloadsCache" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore Windows vcpkg cache
        if: contains(matrix.target, 'windows')
        uses: actions/cache@v5
        with:
          path: |
            .cache/vcpkg/binary
            .cache/vcpkg/downloads
          key: windows-vcpkg-${{ matrix.target }}-${{ hashFiles('.github/actions/setup-native-prereqs/action.yml', 'crates/dsview-sys/native/CMakeLists.txt') }}
          restore-keys: |
            windows-vcpkg-${{ matrix.target }}-

      - name: Setup native prerequisites
        uses: ./.github/actions/setup-native-prereqs
        with:
          target: ${{ matrix.target }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "DSVIEW_BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build workspace
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Find runtime library (Windows)
        if: matrix.package_bundle && contains(matrix.target, 'windows')
        id: find-runtime-windows
        shell: pwsh
        run: |
          $runtime = Get-ChildItem "target/${{ matrix.target }}/release/build" -Recurse -Filter "dsview_runtime.dll" -ErrorAction Stop |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $runtime) {
            throw "Windows runtime library was not found under target/${{ matrix.target }}/release/build"
          }
          "runtime-lib=$runtime" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Find decode runtime library (Windows)
        if: matrix.package_bundle && contains(matrix.target, 'windows')
        id: find-decode-runtime-windows
        shell: pwsh
        run: |
          $runtime = Get-ChildItem "target/${{ matrix.target }}/release/build" -Recurse -Filter "dsview_decode_runtime.dll" -ErrorAction Stop |
            Sort-Object FullName |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $runtime) {
            throw "Windows decode runtime library was not found under target/${{ matrix.target }}/release/build"
          }
          "runtime-lib=$runtime" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Find runtime library (Unix)
        if: matrix.package_bundle && !contains(matrix.target, 'windows')
        id: find-runtime-unix
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"darwin"* ]] || [[ "${{ matrix.target }}" == *"macos"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.dylib" -print -quit)
          else
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-runtime-build -name "libdsview_runtime.so" -print -quit)
          fi
          if [[ -z "$RUNTIME_LIB" ]]; then
            echo "runtime library was not found for ${{ matrix.target }}" >&2
            exit 1
          fi
          echo "runtime-lib=$RUNTIME_LIB" >> "$GITHUB_OUTPUT"

      - name: Find decode runtime library (Unix)
        if: matrix.package_bundle && !contains(matrix.target, 'windows')
        id: find-decode-runtime-unix
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"darwin"* ]] || [[ "${{ matrix.target }}" == *"macos"* ]]; then
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-decode-runtime-build -name "libdsview_decode_runtime.dylib" -print -quit)
          else
            RUNTIME_LIB=$(find target/${{ matrix.target }}/release/build/dsview-sys-*/out/source-decode-runtime-build -name "libdsview_decode_runtime.so" -print -quit)
          fi
          if [[ -z "$RUNTIME_LIB" ]]; then
            echo "decode runtime library was not found for ${{ matrix.target }}" >&2
            exit 1
          fi
          echo "runtime-lib=$RUNTIME_LIB" >> "$GITHUB_OUTPUT"

      - name: Determine executable path
        if: matrix.package_bundle
        id: exe-path
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            echo "exe=target/${{ matrix.target }}/release/dsview-cli.exe" >> $GITHUB_OUTPUT
          else
            echo "exe=target/${{ matrix.target }}/release/dsview-cli" >> $GITHUB_OUTPUT
          fi

      - name: Package and validate bundle
        if: matrix.package_bundle
        uses: ./.github/actions/package-and-validate
        with:
          target: ${{ matrix.target }}
          version: ${{ steps.version.outputs.version }}
          exe-path: ${{ steps.exe-path.outputs.exe }}
          runtime-path: ${{ contains(matrix.target, 'windows') && steps.find-runtime-windows.outputs.runtime-lib || steps.find-runtime-unix.outputs.runtime-lib }}
          decode-runtime-path: ${{ contains(matrix.target, 'windows') && steps.find-decode-runtime-windows.outputs.runtime-lib || steps.find-decode-runtime-unix.outputs.runtime-lib }}
          decoder-dir: DSView/libsigrokdecode4DSL/decoders
  publish-release:
    name: publish-release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all release bundles
        uses: actions/download-artifact@v8
        with:
          path: release-bundles

      - name: Generate checksums
        shell: bash
        run: |
          cd release-bundles
          find . -name "*.tar.gz" -exec sha256sum {} \; | sed 's|^\./||' | sed 's|/| |' | awk '{print $1 "  " $3}' > ../dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt
          cd ..
          cat dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-bundles/*/*.tar.gz
            dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt
          body: |
            ## DSView CLI ${{ steps.version.outputs.version }}

            ### Supported Platforms

            This release provides pre-built bundles for:
            - Linux x86_64 and ARM64
            - macOS x86_64 (Intel) and ARM64 (Apple Silicon)
            - Windows x86_64 and ARM64

            ### Bundle Contents

            Each bundle contains:
            - platform-appropriate `dsview-cli` executable
            - `runtime/` directory with the platform-specific runtime library
            - `decode-runtime/` directory with the platform-specific decode runtime library
            - `decoders/` directory with bundled DSView decoder scripts
            - `python/` directory with the bundled Python runtime used by protocol decoding
            - `resources/` directory with DSLogic Plus firmware and bitstreams

            ### Installation

            1. Download the bundle for your platform
            2. Verify the checksum against `dsview-cli-${{ steps.version.outputs.version }}-SHA256SUMS.txt`
            3. Extract the archive: `tar xzf dsview-cli-${{ steps.version.outputs.version }}-<platform>.tar.gz`
            4. Run the CLI from the extracted directory

            ### Usage

            The CLI automatically discovers bundled runtime, decode runtime, resources, and decoder scripts relative to the executable location. Use explicit path flags if you need to override them.

            See the [README](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.version }}/README.md) for detailed usage instructions.

            ### Device Support

            This release supports **DSLogic Plus** devices only.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
