name: 'Setup Native Prerequisites'
description: 'Install platform-specific native dependencies for DSView CLI builds'
inputs:
  target:
    description: 'Rust target triple'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Install Linux x86_64 dependencies
      if: inputs.target == 'x86_64-unknown-linux-gnu'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libglib2.0-dev \
          libusb-1.0-0-dev \
          libfftw3-dev

    - name: Install Linux ARM64 dependencies
      if: inputs.target == 'aarch64-unknown-linux-gnu'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libglib2.0-dev \
          libusb-1.0-0-dev \
          libfftw3-dev

    - name: Install macOS dependencies
      if: startsWith(inputs.target, 'x86_64-apple-darwin') || startsWith(inputs.target, 'aarch64-apple-darwin')
      shell: bash
      run: |
        for formula in cmake pkg-config glib libusb fftw; do
          if brew list --versions "$formula" >/dev/null 2>&1; then
            echo "$formula is already installed"
          else
            brew install "$formula"
          fi
        done

    - name: Install Windows dependencies
      if: endsWith(inputs.target, '-pc-windows-msvc')
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        if ($env:VCPKG_DEFAULT_BINARY_CACHE) {
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
        }
        if ($env:VCPKG_DOWNLOADS) {
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DOWNLOADS | Out-Null
        }

        $Triplet = switch ("${{ inputs.target }}") {
          "x86_64-pc-windows-msvc" { "x64-windows" }
          "aarch64-pc-windows-msvc" { "arm64-windows" }
          default { throw "unsupported Windows target: ${{ inputs.target }}" }
        }

        $BundledVcpkg = 'C:\vcpkg\vcpkg.exe'
        $ResolvedVcpkg = Get-Command vcpkg -CommandType Application -ErrorAction SilentlyContinue | Select-Object -First 1
        $VcpkgExe = if (Test-Path $BundledVcpkg) {
          $BundledVcpkg
        } elseif ($ResolvedVcpkg) {
          $ResolvedVcpkg.Source
        } else {
          throw 'vcpkg executable was not found'
        }

        $VcpkgRoot = Split-Path -Parent $VcpkgExe
        $env:VCPKG_ROOT = $VcpkgRoot
        $env:VCPKG_INSTALLATION_ROOT = $VcpkgRoot
        Write-Host "Using vcpkg at $VcpkgExe"

        $Packages = @("glib:$Triplet", "libusb:$Triplet", "fftw3:$Triplet", "pkgconf:$Triplet")
        & $VcpkgExe install $Packages
        if ($LASTEXITCODE -ne 0) {
          throw "vcpkg install failed with exit code $LASTEXITCODE"
        }

        $PkgConfigExe = "$VcpkgRoot/installed/$Triplet/tools/pkgconf/pkgconf.exe"
        $PkgConfigPath = "$VcpkgRoot/installed/$Triplet/lib/pkgconfig;$VcpkgRoot/installed/$Triplet/share/pkgconfig"
        $PkgConfigBin = "$VcpkgRoot/installed/$Triplet/tools/pkgconf"
        $RuntimeBin = "$VcpkgRoot/installed/$Triplet/bin"
        $DebugRuntimeBin = "$VcpkgRoot/installed/$Triplet/debug/bin"

        "VCPKG_ROOT=$VcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "VCPKG_INSTALLATION_ROOT=$VcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "DSVIEW_VCPKG_ROOT=$VcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "DSVIEW_VCPKG_TRIPLET=$Triplet" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "CMAKE_TOOLCHAIN_FILE=$VcpkgRoot/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PKG_CONFIG=$PkgConfigExe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PKG_CONFIG_PATH=$PkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PKG_CONFIG_LIBDIR=$PkgConfigPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        "PATH=$RuntimeBin;$DebugRuntimeBin;$PkgConfigBin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
